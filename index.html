<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRK Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200&family=Bebas+Neue&family=Pacifico&family=Space+Mono:ital@1&family=Abril+Fatface&family=Dancing+Script:wght@700&family=Righteous&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 80px;
      animation: bgAnim 12s ease-in-out infinite;
    }
    .logo-img {
      display: block;
      width: 440px;
      max-width: 90vw;
      margin: 0 auto 36px auto;
    }
    .slogan span {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      opacity: 0;
    }
    .s1 { font-family: 'Playfair Display', serif;   font-weight: 400; font-size: 22px; color: #6B5240; letter-spacing: 0.12em; animation: fadeInOut 49s ease-in-out infinite 0s;   }
    .s2 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 24px; color: #8B7355; letter-spacing: 0.08em; animation: fadeInOut 49s ease-in-out infinite -7s;  }
    .s3 { font-family: 'Italiana', serif;            font-size: 24px; color: #7A6548; letter-spacing: 0.32em; animation: fadeInOut 49s ease-in-out infinite -14s; }
    .s4 { font-family: 'Cinzel', serif;              font-weight: 400; font-size: 17px; color: #5C4A36; letter-spacing: 0.36em; animation: fadeInOut 49s ease-in-out infinite -21s; }
    .s5 { font-family: 'Bodoni Moda', serif;         font-style: italic; font-weight: 400; font-size: 21px; color: #9C8A6E; letter-spacing: 0.06em; animation: fadeInOut 49s ease-in-out infinite -28s; }
    .s6 { font-family: 'Marcellus', serif;           font-size: 21px; color: #A0906F; letter-spacing: 0.22em; animation: fadeInOut 49s ease-in-out infinite -35s; }
    .s7 { font-family: 'Tenor Sans', sans-serif;     font-size: 18px; color: #B5A48A; letter-spacing: 0.4em;  animation: fadeInOut 49s ease-in-out infinite -42s; }
    .email {
      position: fixed;
      bottom: 32px;
      left: 0; right: 0;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 200;
      letter-spacing: 0.2em;
      color: #8B7355;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .email:hover { opacity: 0.6; }
    @keyframes bgAnim {
      0%   { background: #E8DFD0; }
      33%  { background: #D9CCBA; }
      66%  { background: #E4D9C8; }
      100% { background: #E8DFD0; }
    }
    @keyframes fadeInOut {
      0%   { opacity: 0; }
      4%   { opacity: 1; }
      11%  { opacity: 1; }
      15%  { opacity: 0; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div style="text-align:center;">
    <img class="logo-img" src="logo.png" alt="BRK Labs">
    <div class="slogan">
      <span class="s1">Break Rules. Build Brands.</span>
      <span class="s2">Break Rules. Build Brands.</span>
      <span class="s3">Break Rules. Build Brands.</span>
      <span class="s4">Break Rules. Build Brands.</span>
      <span class="s5">Break Rules. Build Brands.</span>
      <span class="s6">Break Rules. Build Brands.</span>
      <span class="s7">Break Rules. Build Brands.</span>
    </div>
  </div>
  <a class="email" href="mailto:hi@brklabs.com">hi@brklabs.com</a>
</body>
</html>
