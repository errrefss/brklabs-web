<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRK Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@200;300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: bgAnim 12s ease-in-out infinite;
    }
    .logo-img {
      width: 440px;
      max-width: 90vw;
      margin-bottom: 36px;
    }
    .slogan {
      text-align: center;
      font-size: 17px;
      animation: sloganAnim 12s ease-in-out infinite;
    }
    .email {
      position: fixed;
      bottom: 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 200;
      letter-spacing: 0.2em;
      color: #8B7355;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .email:hover { opacity: 0.6; }
    @keyframes bgAnim {
      0%   { background: #E8DFD0; }
      33%  { background: #D9CCBA; }
      66%  { background: #E4D9C8; }
      100% { background: #E8DFD0; }
    }
    @keyframes sloganAnim {
      0%   { font-family: 'DM Sans', sans-serif;     font-weight: 200; font-style: normal; color: #8B7355; letter-spacing: 0.2em;  }
      25%  { font-family: 'DM Sans', sans-serif;     font-weight: 200; font-style: normal; color: #8B7355; letter-spacing: 0.2em;  }
      33%  { font-family: 'Lora', serif;             font-weight: 400; font-style: italic; color: #6B5240; letter-spacing: 0.12em; }
      58%  { font-family: 'Lora', serif;             font-weight: 400; font-style: italic; color: #6B5240; letter-spacing: 0.12em; }
