<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRK Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@200;300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: bgAnim 12s ease-in-out infinite;
    }
    .logo-img {
      width: 220px;
      margin-bottom: 28px;
      opacity: 0.85;
    }
    .slogan {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.28em;
      animation: sloganAnim 12s ease-in-out infinite;
    }
    .email {
      position: fixed;
      bottom: 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 200;
      letter-spacing: 0.2em;
      color: #B5A48A;
      text-decoration: none;
      transition: color 0.3s;
    }
    .email:hover { color: #8B7355; }
    @keyframes bgAnim {
      0%   { background: #F2EDE4; }
      33%  { background: #EDE6D8; }
      66%  { background: #F5F0EA; }
      100% { background: #F2EDE4; }
    }
    @keyframes sloganAnim {
      0%   { font-family: 'DM Sans', sans-serif;     font-weight: 200; font-style: normal; color: #B5A48A; letter-spacing: 0.28em; }
      25%  { font-family: 'DM Sans', sans-serif;     font-weight: 200; font-style: normal; color: #B5A48A; letter-spacing: 0.28em; }
      33%  { font-family: 'Lora', serif;             font-weight: 400; font-style: italic; color: #8B7355; letter-spacing: 0.15em; }
      58%  { font-family: 'Lora', serif;             font-weight: 400; font-style: italic; color: #8B7355; letter-spacing: 0.15em; }
      66%  { font-family: 'Playfair Display', serif; font-weight: 400; font-style: normal; color: #C4A882; letter-spacing: 0.2em;  }
      91%  { font-family: 'Playfair Display', serif; font-weight: 400; font-style: normal; color: #C4A882; letter-spacing: 0.2em;  }
      100% { font-family: 'DM Sans', sans-serif;     font-weight: 200; font-style: normal; color: #B5A48A; letter-spacing: 0.28em; }
    }
  </style>
</head>
<body>
  <div style="text-align:center;">
    <img class="logo-img" src="logo.png" alt="BRK Labs">
    <div class="slogan">Break Rules. Build Brands.</div>
  </div>
  <a class="email" href="mailto:hi@brklabs.com">hi@brklabs.com</a>
</body>
</html>
