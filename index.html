  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 80px;
    animation: bgAnim 12s ease-in-out infinite;
  }
  .logo-img {
    display: block;
    width: 440px;
    height: auto;
    max-width: 90vw;
    margin: 0 auto 72px auto; /* 로고와 슬로건 간격 확대 */
  }
  .slogan {
    position: relative;
    height: 40px;
    width: 100%;
  }
  .slogan span {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    opacity: 0;
  }
  /* 텍스트 색상을 더 옅고 부드러운 톤으로 수정 */
  .s1 { font-family: 'DM Sans', sans-serif; font-weight: 200; font-size: 22px; color: #9A8373; letter-spacing: 0.12em; animation: fadeInOut 49s linear infinite 0s; }
  .s2 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 24px; color: #B19E86; letter-spacing: 0.08em; animation: fadeInOut 49s linear infinite -7s; }
  .s3 { font-family: 'Italiana', serif; font-size: 24px; color: #A4937C; letter-spacing: 0.32em; animation: fadeInOut 49s linear infinite -14s; }
  .s4 { font-family: 'Cinzel', serif; font-weight: 400; font-size: 17px; color: #8E8071; letter-spacing: 0.36em; animation: fadeInOut 49s linear infinite -21s; }
  .s5 { font-family: 'Bodoni Moda', serif; font-style: italic; font-weight: 400; font-size: 21px; color: #BCAF9C; letter-spacing: 0.06em; animation: fadeInOut 49s linear infinite -28s; }
  .s6 { font-family: 'Marcellus', serif; font-size: 21px; color: #BFB298; letter-spacing: 0.22em; animation: fadeInOut 49s linear infinite -35s; }
  .s7 { font-family: 'Tenor Sans', sans-serif; font-size: 18px; color: #C8BCA6; letter-spacing: 0.4em; animation: fadeInOut 49s linear infinite -42s; }
  .email {
    position: fixed;
    bottom: 32px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 200;
    letter-spacing: 0.2em;
    color: #8B7355;
    text-decoration: none;
    transition: opacity 0.3s;
  }
  .email:hover { opacity: 0.6; }
  @keyframes bgAnim {
    0% { background: #E8DFD0; }
    33% { background: #D9CCBA; }
    66% { background: #E4D9C8; }
    100% { background: #E8DFD0; }
  }
  @keyframes fadeInOut {
    0% { opacity: 0; }
    2.04% { opacity: 1; }
    14.28% { opacity: 1; }
    16.33% { opacity: 0; }
    100% { opacity: 0; }
  }
  </style>

<body>
  <div style="text-align:center; width: 100%;">
    <img class="logo-img" src="logo.png" alt="BRK Labs" width="440" height="260">
    <div class="slogan">
      <span class="s1">Break Rules. Build Brands.</span>
      <span class="s2" aria-hidden="true">Break Rules. Build Brands.</span>
      <span class="s3" aria-hidden="true">Break Rules. Build Brands.</span>
      <span class="s4" aria-hidden="true">Break Rules. Build Brands.</span>
      <span class="s5" aria-hidden="true">Break Rules. Build Brands.</span>
      <span class="s6" aria-hidden="true">Break Rules. Build Brands.</span>
      <span class="s7" aria-hidden="true">Break Rules. Build Brands.</span>
    </div>
  </div>
  <a class="email" href="mailto:hi@brklabs.com">hi@brklabs.com</a>
</body>
