<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRK Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Syne:wght@400;800&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@200;300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: bgAnim 6s infinite;
    }
    .brk {
      text-align: center;
      font-size: clamp(72px, 16vw, 110px);
      line-height: 0.85;
      letter-spacing: 0.08em;
      animation: brkAnim 6s infinite;
    }
    .labs {
      text-align: center;
      font-size: clamp(28px, 6vw, 42px);
      line-height: 1;
      letter-spacing: 0.25em;
      animation: labsAnim 6s infinite;
      margin-bottom: 32px;
    }
    .slogan {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.28em;
      animation: sloganAnim 6s infinite;
    }
    .email {
      position: fixed;
      bottom: 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 200;
      letter-spacing: 0.2em;
      color: #B5A48A;
      text-decoration: none;
    }
    .email:hover { color: #8B7355; }
    @keyframes bgAnim {
      0%   { background: #F2EDE4; }
      25%  { background: #EDE6D8; }
      50%  { background: #F5F0EA; }
      75%  { background: #EAE3D8; }
      100% { background: #F2EDE4; }
    }
    @keyframes brkAnim {
      0%   { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: normal;  color: #2C2318; }
      16%  { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: normal;  color: #2C2318; }
      25%  { font-family: 'Syne', sans-serif;          font-weight: 800; font-style: normal;  color: #8B7355; }
      41%  { font-family: 'Syne', sans-serif;          font-weight: 800; font-style: normal;  color: #8B7355; }
      50%  { font-family: 'DM Serif Display', serif;   font-weight: 400; font-style: italic;  color: #C4A882; }
      66%  { font-family: 'DM Serif Display', serif;   font-weight: 400; font-style: italic;  color: #C4A882; }
      75%  { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-style: normal;  color: #4A3728; }
      91%  { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-style: normal;  color: #4A3728; }
      100% { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: normal;  color: #2C2318; }
    }
    @keyframes labsAnim {
      0%   { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; color: #C4A882; }
      16%  { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; color: #C4A882; }
      25%  { font-family: 'Syne', sans-serif;          font-weight: 400; font-style: normal; color: #2C2318; }
      41%  { font-family: 'Syne', sans-serif;          font-weight: 400; font-style: normal; color: #2C2318; }
      50%  { font-family: 'DM Serif Display', serif;   font-weight: 400; font-style: normal; color: #8B7355; }
      66%  { font-family: 'DM Serif Display', serif;   font-weight: 400; font-style: normal; color: #8B7355; }
      75%  { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; color: #C4A882; }
      91%  { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; color: #C4A882; }
      100% { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; color: #C4A882; }
    }
    @keyframes sloganAnim {
      0%   { font-family: 'DM Sans', sans-serif;       font-weight: 200; font-style: normal; color: #B5A48A; letter-spacing: 0.28em; }
      16%  { font-family: 'DM Sans', sans-serif;       font-weight: 200; font-style: normal; color: #B5A48A; letter-spacing: 0.28em; }
      25%  { font-family: 'Syne', sans-serif;          font-weight: 400; font-style: normal; color: #8B7355; letter-spacing: 0.15em; }
      41%  { font-family: 'Syne', sans-serif;          font-weight: 400; font-style: normal; color: #8B7355; letter-spacing: 0.15em; }
      50%  { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; color: #C4A882; letter-spacing: 0.2em;  }
      66%  { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; color: #C4A882; letter-spacing: 0.2em;  }
      75%  { font-family: 'DM Serif Display', serif;   font-weight: 400; font-style: normal; color: #4A3728; letter-spacing: 0.1em;  }
      91%  { font-family: 'DM Serif Display', serif;   font-weight: 400; font-style: normal; color: #4A3728; letter-spacing: 0.1em;  }
      100% { font-family: 'DM Sans', sans-serif;       font-weight: 200; font-style: normal; color: #B5A48A; letter-spacing: 0.28em; }
    }
  </style>
</head>
<body>
  <div>
    <div class="brk">BRK</div>
    <div class="labs">Labs</div>
    <div class="slogan">Break Rules. Build Brands.</div>
  </div>
  <a class="email" href="mailto:hi@brklabs.com">hi@brklabs.com</a>
</body>
</html>
